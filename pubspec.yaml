name: packtrack
description: A minimal and clean package tracking application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Maps
  google_maps_flutter: ^2.5.3

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.8.3

  # Networking
  http: ^1.2.0
  dio: ^5.4.0

  # UI Components
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.0.0

  # Barcode/QR Scanner
  mobile_scanner: ^4.0.1

  # Share
  share_plus: ^7.2.1

  # URL Launcher (for phone calls)
  url_launcher: ^6.2.4

  # Internationalization
  intl: ^0.19.0

  # Utils
  uuid: ^4.3.3
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/translations/
