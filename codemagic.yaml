workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK (debug)
        script: |
          flutter build apk --debug
          cp build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/packtrack-debug.apk || true
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/**/*.aab
      - build/**/outputs/**/*.apk
