workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK (debug)
        script: |
          cd android
          ./gradlew assembleDebug
          cd ..
          echo "=== APK files generated ==="
          find build -name "*.apk" -type f
          mkdir -p $CM_BUILD_DIR/apk_output
          find build -name "*.apk" -type f -exec cp {} $CM_BUILD_DIR/apk_output/ \;
          ls -la $CM_BUILD_DIR/apk_output/
    artifacts:
      - apk_output/*.apk
      - build/**/outputs/**/*.apk
