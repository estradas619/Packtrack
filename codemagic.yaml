workflows:
  default-workflow:
    name: Default Workflow
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build APK (debug)
        script: |
          flutter build apk --debug
          echo "APK location:"
          find build -name "*.apk" -type f
    artifacts:
      - build/**/*.apk
      - build/**/*.aab
